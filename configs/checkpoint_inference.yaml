model:
  num_frames: 32
  feature_dim: 2048
  flow_dim: 2
  fused_dim: 1024
  transformer_heads: 8
  transformer_layers: 4
  dropout: 0.1

training:
  batch_size: 6
  epochs: 10
  learning_rate: 0.0001
  weight_decay: 0.00001
  triplet_margin: 1.0
  consistency_weight: 0.5
  device: "cuda"
  num_workers: 0
  pin_memory: true
  persistent_workers: false
  sampling_method: "uniform"
  max_train_samples: 500
  max_val_samples: 100

data_dir: "C:\\Users\\adity\\Downloads\\ml-ware-26-sherlock-files\\test"
output_dir: "checkpoints"
use_wandb: false
wandb_project: "video-chronological-sorting"
